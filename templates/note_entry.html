{% extends 'base.html' %}
{% block content %}
<h1 class="mb-3">Saisie des notes</h1>
<div class="card shadow-sm mb-3"><div class="card-body">
  <form method="get" class="row g-2 align-items-end">
    <div class="col-12 col-md-6">
      <label class="form-label">Module</label>
      <select name="module_id" class="form-select" onchange="this.form.submit()">
        <option value="">Choisir module</option>
        {% for m in modules %}<option value="{{ m.id }}" {% if selected_module_id == m.id %}selected{% endif %}>{{ m.nom }}</option>{% endfor %}
      </select>
    </div>
    <div class="col-12 col-md-6">
      <label class="form-label">Groupe</label>
      <select name="groupe_id" class="form-select" onchange="this.form.submit()">
        <option value="">Choisir groupe</option>
        {% for g in groupes %}<option value="{{ g.id }}" {% if selected_group_id == g.id %}selected{% endif %}>{{ g.nom }}</option>{% endfor %}
      </select>
    </div>
  </form>
</div></div>
{% if etudiants %}
<form method="post" class="card shadow-sm">
  <input type="hidden" name="module_id" value="{{ selected_module_id }}">
  <input type="hidden" name="groupe_id" value="{{ selected_group_id }}">
  <div class="card-body table-responsive">
    <table class="table align-middle">
      <thead><tr><th>Étudiant</th><th>Contrôle</th><th>Examen</th><th>Historique</th></tr></thead>
      <tbody>
        {% for e in etudiants %}
        <tr>
          <td>{{ e.nom }} {{ e.prenom }}</td>
          <td><input type="number" step="0.01" min="0" max="20" class="form-control" name="controle_{{ e.id }}" value="{{ notes_map.get((e.id, 'controle'), '') }}"></td>
          <td><input type="number" step="0.01" min="0" max="20" class="form-control" name="examen_{{ e.id }}" value="{{ notes_map.get((e.id, 'examen'), '') }}"></td>
          <td><a class="btn btn-outline-secondary btn-sm" href="{{ url_for('student_history', etudiant_id=e.id) }}">Voir</a></td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    <button class="btn btn-primary">Enregistrer les notes</button>
  </div>
</form>
{% endif %}
{% endblock %}
